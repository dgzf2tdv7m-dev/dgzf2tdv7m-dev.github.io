    <p>エンジェルヴォルトは、安否確認ができなくなったときに信頼できる人へ渡したい言葉、ファイル、手順を保存する静かなデジタル保管庫です。</p>

    <p>本アプリは遺言、信託、委任状、弁護士、法的文書の代替ではありません。配信は端末、ネットワーク、Apple通知サービス、システムメールやメッセージに依存するため保証できません。</p>
