    <body><span class="tag">本地优先 · 不追踪</span><h1>TradeInvoice One 隐私政策</h1>
    <p>TradeInvoice One 用于在设备本地创建客户、估价单、发票、PDF 和 CSV 文件。应用不创建广告画像，不出售个人信息，也不会自动上传用户录入的公司、客户或账单数据。</p>
    <h2>收集的数据</h2><p>应用不要求账户登录。用户输入的客户资料、公司信息、项目明细和付款信息保存在本机 SwiftData 数据库中。</p>
    <h2>导出</h2><p>PDF 和 CSV 仅在用户主动点击导出或分享时生成，并交由 iOS 系统分享面板处理。</p>
    <h2>联系</h2><p>隐私问题可联系 support@example.com。版本 1.0，更新日期 2026-06-21。</p></body></html>
