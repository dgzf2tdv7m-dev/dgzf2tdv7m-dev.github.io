<p>我们不收集、出售或共享个人健康数据；不使用广告 SDK；不进行跨 App 或跨网站追踪。</p>
<p>App 会请求通知权限，用于发送服药提醒和低库存提醒。通知内容由设备本地生成。</p>
<p>PDF 导出仅在用户主动分享时离开设备，分享对象由用户在 iOS 分享面板中选择。</p>
