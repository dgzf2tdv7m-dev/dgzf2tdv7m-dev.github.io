<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DoseBell Family 支持</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;max-width:820px;margin:48px auto;padding:0 22px;line-height:1.72;color:#0f172a}h1{color:#ef4444}a{color:#16a34a}.card{border:1px solid #e2e8f0;border-radius:14px;padding:18px;background:#fff}</style></head>
<body><h1>DoseBell Family 支持</h1><div class="card">
<h2>常见问题</h2>
<p><strong>如何添加半片？</strong> 在药品页新增药品，剂量步进为 0.5，可选择半片、1.5 片等。</p>
<p><strong>提醒从哪里来？</strong> App 使用 iOS UserNotifications，本地生成每日提醒和库存提醒。</p>
<p><strong>看板会同步到云端吗？</strong> 不会。家属看板为同设备视图，适合家庭共用设备或照护者当面查看。</p>
<p><strong>如何导出历史？</strong> 在历史页点击“导出 PDF 服用历史”。</p>
<p>支持邮箱：support@codexpipeline.local</p></div></body></html>
